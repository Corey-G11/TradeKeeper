name: Deploy TradeKeeper to GitHub Pages

on:
  # Build & publish on every push to the deploy branch
  push:
    branches:
      - claude/tradekeeper-mobile-app-QJK2B
      - main
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions needed to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Let one deployment finish before starting another
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false # don't treat lint warnings as build-breaking errors

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
